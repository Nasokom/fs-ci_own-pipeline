name: Deployement pipeline 

on: 
    push:
      branches:
        - main

jobs: 
    build_and_test:
        runs-on: ubuntu-latest
        steps: 
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                node-version: '24'
            
            - name: install frontdep
              run: cd frontend && npm i
            - name: test frontend
              run: cd frontend && npm run test
            - name: prod build frontend
              run: cd frontend && npm run build
            - name: install server dependencies 
              run: npm ci
            - name: test server 
              env:
               TEST_MONGODB_URI: ${{ secrets.TEST_MONGODB_URI }}
               SECRET: ${{ secrets.SECRET }}
               PORT: ${{ secrets.PORT }}

              run: npm run test:server
            - name: Install playwright browser
              run: npx playwright install --with-deps
            - name: run playwright test 
              env:
               TEST_MONGODB_URI: ${{ secrets.TEST_MONGODB_URI }}
               SECRET: ${{ secrets.SECRET }}
               PORT: ${{ secrets.PORT }}
               
              run: npm run test 


    deploy:
      runs-on: ubuntu-latest
      needs: [build_and_test]
      steps:
        - name: Deploy
          if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !contains(join(github.event.commits.*.message, ', '), '#skip')
          env:
            render_hook: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          run: |
           curl "$render_hook"